<<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SLT IT Help Desk Assistant</title>

<style>

body{
  font-family: "Segoe UI", Arial, sans-serif;
  margin:0;
  background:linear-gradient(135deg,#003A8F,#0056D2);
  min-height:100vh;
}

.wrap{
  max-width:760px;
  margin:40px auto;
  padding:0 14px;
}

.card{
  background:#ffffff;
  border-radius:16px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.header{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
}

.header img{
  height:34px;
}

.header h2{
  margin:0;
  color:#003A8F;
  font-weight:600;
}

.messages{
  height:60vh;
  overflow:auto;
  padding:12px;
  border-radius:12px;
  background:#f5f8ff;
  border:1px solid #dce5ff;
}

.msg{
  margin:10px 0;
  display:flex;
}

.msg.user{
  justify-content:flex-end;
}

.bubble{
  max-width:75%;
  padding:10px 14px;
  border-radius:14px;
  line-height:1.4;
  font-size:14px;
  white-space:pre-wrap;
}

.user .bubble{
  background:linear-gradient(135deg,#0056D2,#0074ff);
  color:white;
}

.bot .bubble{
  background:#ffffff;
  border:1px solid #d0d9ff;
}

.row{
  display:flex;
  gap:8px;
  margin-top:12px;
}

input{
  flex:1;
  padding:11px;
  border-radius:12px;
  border:1px solid #cfd8ff;
  font-size:14px;
}

input:focus{
  outline:none;
  border-color:#0056D2;
}

button{
  padding:11px 16px;
  border-radius:12px;
  border:0;
  background:linear-gradient(135deg,#0056D2,#003A8F);
  color:#fff;
  font-weight:500;
  cursor:pointer;
}

button:hover{
  background:linear-gradient(135deg,#003A8F,#002f73);
}

button:disabled{
  opacity:.6;
  cursor:not-allowed;
}

.chips{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}

.chip{
  border:1px solid #cfd8ff;
  background:#f4f7ff;
  padding:7px 12px;
  border-radius:999px;
  cursor:pointer;
  font-size:13px;
}

.chip:hover{
  background:#e6edff;
}

.meta{
  font-size:12px;
  color:#666;
  margin-top:8px;
}

.error{
  color:#b00020;
}

</style>
</head>

<body>

<div class="wrap">

<div class="card">

<div class="header">
<img src="SLTMobitel_Logo.svg">
<h2>SLT IT Help Desk Assistant</h2>
</div>

<div id="messages" class="messages"></div>

<div id="chips" class="chips" style="display:none;"></div>

<div class="row">
<input id="input" placeholder="Describe your issue..." />
<button id="send">Send</button>
</div>

<div class="row">
<button id="modifyTicketBtn" type="button">Modify Created Ticket</button>
</div>

<div class="meta" id="meta"></div>
<div class="meta error" id="error"></div>

</div>
</div>

<script src="./app.js"></script>

</body>
</html>
