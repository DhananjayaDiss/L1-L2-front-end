<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Modify Created Ticket</title>

<style>
body{
  font-family:"Segoe UI", Arial, sans-serif;
  margin:0;
  background:linear-gradient(135deg,#003A8F,#0056D2);
  min-height:100vh;
}

.wrap{
  max-width:760px;
  margin:40px auto;
  padding:0 14px;
}

.card{
  background:#ffffff;
  border-radius:16px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:12px;
}

.header h2{
  margin:0;
  color:#003A8F;
  font-weight:600;
}

.back-btn{
  text-decoration:none;
  background:linear-gradient(135deg,#0056D2,#003A8F);
  color:#fff;
  padding:10px 14px;
  border-radius:12px;
  font-size:14px;
}

.field{
  margin-top:14px;
}

label{
  display:block;
  margin-bottom:6px;
  font-size:14px;
  font-weight:600;
  color:#003A8F;
}

input, textarea{
  width:100%;
  padding:11px;
  border-radius:12px;
  border:1px solid #cfd8ff;
  font-size:14px;
  box-sizing:border-box;
  font-family:"Segoe UI", Arial, sans-serif;
}

input:focus, textarea:focus{
  outline:none;
  border-color:#0056D2;
}

textarea{
  min-height:140px;
  resize:vertical;
}

.row{
  display:flex;
  gap:8px;
  margin-top:16px;
}

button{
  padding:11px 16px;
  border-radius:12px;
  border:0;
  background:linear-gradient(135deg,#0056D2,#003A8F);
  color:#fff;
  font-weight:500;
  cursor:pointer;
}

button:hover{
  background:linear-gradient(135deg,#003A8F,#002f73);
}

button:disabled{
  opacity:.6;
  cursor:not-allowed;
}

.meta{
  font-size:12px;
  color:#666;
  margin-top:10px;
}

.error{
  color:#b00020;
}

.response-box{
  margin-top:18px;
  padding:14px;
  border-radius:12px;
  background:#f5f8ff;
  border:1px solid #dce5ff;
}

.response-title{
  font-size:14px;
  font-weight:600;
  color:#003A8F;
  margin-bottom:10px;
}

.response-content{
  font-size:14px;
  line-height:1.6;
  color:#222;
}

.response-content ol,
.response-content ul{
  padding-left:20px;
}
</style>
</head>

<body>

<div class="wrap">
  <div class="card">

    <div class="header">
      <h2>Modify Created Ticket</h2>
      <a class="back-btn" href="index.html">Back</a>
    </div>

    <div class="field">
      <label for="ticket_id">Ticket ID</label>
      <input id="ticket_id" type="text" placeholder="Enter ticket ID" />
    </div>

    <div class="field">
      <label for="description">Description</label>
      <textarea id="description" placeholder="Enter updated description"></textarea>
    </div>

    <div class="row">
      <button id="submitBtn" type="button">Submit</button>
    </div>

    <div class="meta" id="meta"></div>
    <div class="meta error" id="error"></div>

    <div class="response-box">
      <div class="response-title">Response</div>
      <div class="response-content" id="responseContent">The response will appear here.</div>
    </div>

  </div>
</div>

<script src="./modify-ticket.js"></script>

</body>
</html>
